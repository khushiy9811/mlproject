<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🎓 Student Exam Performance Predictor</h1>

        <p class="subtitle">
            Predict the Mathematics Score using Machine Learning
        </p>

        <form action="{{ url_for('predict_datapoint') }}" method="POST">

            <div class="input-group">
                <label>Gender</label>

                <select name="gender" required>
                    <option disabled selected>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="input-group">
                <label>Race / Ethnicity</label>

                <select name="ethnicity" required>
                    <option disabled selected>Select Group</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="input-group">

                <label>Parental Level of Education</label>

                <select name="parental_level_of_education" required>

                    <option disabled selected>Select</option>

                    <option value="associate's degree">Associate's Degree</option>

                    <option value="bachelor's degree">Bachelor's Degree</option>

                    <option value="high school">High School</option>

                    <option value="master's degree">Master's Degree</option>

                    <option value="some college">Some College</option>

                    <option value="some high school">Some High School</option>

                </select>

            </div>

            <div class="input-group">

                <label>Lunch Type</label>

                <select name="lunch" required>

                    <option disabled selected>Select</option>

                    <option value="standard">Standard</option>

                    <option value="free/reduced">Free / Reduced</option>

                </select>

            </div>

            <div class="input-group">

                <label>Test Preparation Course</label>

                <select name="test_preparation_course" required>

                    <option disabled selected>Select</option>

                    <option value="completed">Completed</option>

                    <option value="none">None</option>

                </select>

            </div>

            <div class="row">

                <div class="input-group">

                    <label>Reading Score</label>

                    <input
                        type="number"
                        name="reading_score"
                        min="0"
                        max="100"
                        placeholder="0-100"
                        required>

                </div>

                <div class="input-group">

                    <label>Writing Score</label>

                    <input
                        type="number"
                        name="writing_score"
                        min="0"
                        max="100"
                        placeholder="0-100"
                        required>

                </div>

            </div>

            <button type="submit">

                Predict Maths Score

            </button>

        </form>

        {% if results %}

        <div class="result">

            <h3>Predicted Maths Score</h3>

            <h2>{{ results }}</h2>

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
